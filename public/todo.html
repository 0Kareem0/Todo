<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
  <div class="todo-container">
    <h1>My To-Do List</h1>

    <!-- Input and Button for Adding New Tasks -->
    <div class="todo-input">
      <input type="text" id="new-task" placeholder="Enter new task" />
      <button onclick="addTask()">Add</button>
    </div>
    
    <ul class="todo-list">
      <li><input type="checkbox" /> Learn HTML</li>
      <li><input type="checkbox" /> Practice CSS</li>
      <li><input type="checkbox" /> Build a Project</li>
      <li><input type="checkbox" /> Take a Break</li>
    </ul>
  </div>
</body>
</html>
